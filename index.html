<!DOCTYPE html>
<html>
<head>
  <title>Data Law Tetris</title>
  <style>
    body { font-family: Arial; text-align: center; }
#gamePanel {
  height: 80vh;
  width: 90vw;
  margin: 0 auto;
  border: 3px solid #222;
  position: relative;
  overflow: hidden;
  background: #f5f7fa;
}

#fallingItem {
  position: absolute;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 220px;
  padding: 16px;
  background: #9dd7ff;
  border: 2px solid #1b4f72;
  border-radius: 8px;
  text-align: center;
  z-index: 2;
}

#bins {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
}

.bin {
  height: 90px;
  border: 2px solid #222;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  background: #ffffff;
}

#fallingItem.dropping::before,
#fallingItem.dropping::after {
  content: "";
  position: absolute;
  top: -45px;
  width: 6px;
  height: 35px;
  background: #1b4f72;
  border-radius: 999px;
  opacity: 0.7;
}

#fallingItem.dropping::before {
  left: 45px;
  transform: rotate(-12deg);
}

#fallingItem.dropping::after {
  right: 45px;
  transform: rotate(12deg);
}

#fallingItem.dropping {
  box-shadow: 0 -18px 0 -10px rgba(27, 79, 114, 0.45),
              0 -34px 0 -18px rgba(27, 79, 114, 0.25);
}

#resultOverlay {
  position: absolute;
  top: 40%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 10;
  font-size: 64px;
  font-weight: 900;
  text-align: center;
  background: white;
  border: 4px solid #222;
  border-radius: 20px;
  padding: 24px 36px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.25);
}

#resultOverlay.hidden {
  display: none;
}

#resultIcon svg {
  width: 120px;
  height: 120px;
  margin-top: 12px;
}

.correct {
  color: #138a36;
}

.incorrect {
  color: #c1121f;
}
  </style>
</head>
<body>

<h1>Data Law Tetris</h1>
<p>Use ← → keys, press SPACE to drop</p>
<p>Score: <span id="score">0</span></p>
<p id="feedback"></p>

<div id="gamePanel">
  <div id="fallingItem">Scenario text here</div>

   <div id="resultOverlay" class="hidden">
    <div>
      <div id="resultText"></div>
      <div id="resultIcon"></div>
    </div>
  </div>

  <div id="bins">
    <div class="bin">PIPEDA</div>
    <div class="bin">FOIPOP</div>
    <div class="bin">PHIA</div>
    <div class="bin">PIIDPA</div>
  </div>
</div>

<script>

  { text: "A municipality uses a US-based contractor to process permit applications.", law: "PIIDPA" },
  { text: "A public body stores employee files on servers located outside Canada.", law: "PIIDPA" },
  { text: "A provincial department allows foreign technical support to access citizen records.", law: "PIIDPA" },
  { text: "A school board uses an online platform that stores student data in the United States.", law: "PIIDPA" },
  { text: "A public college uses a cloud service where student data may be accessed outside Canada.", law: "PIIDPA" },
  { text: "A government agency sends personal information to a vendor in another country.", law: "PIIDPA" },
  { text: "A municipality backs up citizen records to servers outside Canada.", law: "PIIDPA" },

  { text: "A provincial department stores public program applications in a non-Canadian data centre.", law: "PIIDPA" },
  { text: "A public library uses a US-hosted system for patron accounts.", law: "PIIDPA" },
  { text: "A government office contracts a foreign company to analyze citizen survey data.", law: "PIIDPA" },
  { text: "A public university stores student advising notes in an international SaaS platform.", law: "PIIDPA" },
  { text: "A provincial agency permits remote database support from outside Canada.", law: "PIIDPA" },
  { text: "A municipality uploads resident contact lists to a US email marketing service.", law: "PIIDPA" },
  { text: "A public school system uses foreign-hosted software for student assessments.", law: "PIIDPA" },
  { text: "A Nova Scotia public body stores HR files in an overseas cloud system.", law: "PIIDPA" },
  { text: "A provincial department uses a foreign transcription service for citizen interviews.", law: "PIIDPA" },
  { text: "A public institution transfers personal data to a vendor outside Canada for processing.", law: "PIIDPA" },
  { text: "A town office gives non-Canadian support staff access to resident records.", law: "PIIDPA" },
  { text: "A government body stores grant application data in a US-hosted database.", law: "PIIDPA" },
  { text: "A public agency uses an international analytics tool on identifiable citizen data.", law: "PIIDPA" },
  { text: "A public college uses a non-Canadian cloud vendor for student service records.", law: "PIIDPA" },
  { text: "A school board stores parent contact records in a foreign-hosted platform.", law: "PIIDPA" },
  { text: "A provincial office sends citizen records to an overseas call centre.", law: "PIIDPA" }
];

let currentScenario = null;
let currentColumn = 1;
let score = 0;
let scenarioIndex = 0;

let scenarioDeck = [];

function shuffleScenarios() {
  scenarioDeck = [...scenarios];

  for (let i = scenarioDeck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [scenarioDeck[i], scenarioDeck[j]] = [scenarioDeck[j], scenarioDeck[i]];
  }
}

const gamePanel = document.getElementById("gamePanel");
const fallingItem = document.getElementById("fallingItem");
const scoreDisplay = document.getElementById("score");
const feedbackDisplay = document.getElementById("feedback");

function startGame() {
  score = 0;
  currentColumn = 1;

  shuffleScenarios();
  updateScore();
  loadScenario();
}

function updateItemPosition() {
  const columnWidth = gamePanel.clientWidth / laws.length;
  const x = currentColumn * columnWidth + columnWidth / 2;

  fallingItem.style.left = `${x}px`;
}

function moveItem(direction) {
  currentColumn += direction;

  if (currentColumn < 0) currentColumn = 0;
  if (currentColumn >= laws.length) currentColumn = laws.length - 1;

  updateItemPosition();
}

function loadScenario() {
  if (scenarioDeck.length === 0) {
    fallingItem.textContent = "Game over!";
    fallingItem.style.top = "20px";
    fallingItem.style.opacity = "1";
    feedbackDisplay.textContent = `Final score: ${score}`;
    return;
  }

  currentScenario = scenarioDeck.pop();
  currentColumn = 1;

  fallingItem.style.transition = "none";
  fallingItem.style.top = "20px";
  fallingItem.style.opacity = "1";
  fallingItem.textContent = currentScenario.text;

  updateItemPosition();
  feedbackDisplay.textContent = "";
}

function dropItem() {
  if (!currentScenario) return;

  const scenarioBeingDropped = currentScenario;
  const selectedLaw = laws[currentColumn];

  currentScenario = null;

  const panelHeight = gamePanel.clientHeight;
  const itemHeight = fallingItem.offsetHeight;
  const binHeight = 90;

  const dropY = panelHeight - binHeight - itemHeight + 10;

  fallingItem.classList.add("dropping");

  fallingItem.style.transition = "top 0.45s ease-in";
  fallingItem.style.top = `${dropY}px`;

    setTimeout(() => {
  fallingItem.classList.remove("dropping");

  const isCorrect = selectedLaw === scenarioBeingDropped.law;

  if (isCorrect) {
    score += 5;
    feedbackDisplay.textContent = `Correct: ${selectedLaw}`;
  } else {
    score -= 5;
    feedbackDisplay.textContent = `Incorrect. Correct answer: ${scenarioBeingDropped.law}`;
  }

  showResult(isCorrect);
  updateScore();

  fallingItem.style.opacity = "0";

  setTimeout(() => {
    loadScenario();
  }, 250);

}, 500);
}


function updateScore() {
  scoreDisplay.textContent = score;
}

document.addEventListener("keydown", (event) => {
  if (event.code === "ArrowLeft") {
    moveItem(-1);
  }

  if (event.code === "ArrowRight") {
    moveItem(1);
  }

  if (event.code === "Space" || event.code === "Enter") {
    event.preventDefault();
    dropItem();
  }
});

window.addEventListener("resize", updateItemPosition);


const resultOverlay = document.getElementById("resultOverlay");
const resultText = document.getElementById("resultText");
const resultIcon = document.getElementById("resultIcon");

const correctSVG = `
<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <circle cx="60" cy="60" r="52" fill="#b7f7c2" stroke="#138a36" stroke-width="6"/>
  <circle cx="42" cy="43" r="5" fill="#138a36"/>
  <circle cx="78" cy="43" r="5" fill="#138a36"/>
  <path d="M43 70 Q60 88 77 70" fill="none" stroke="#138a36" stroke-width="5" stroke-linecap="round"/>
</svg>
`;

const incorrectSVG = `
<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <circle cx="60" cy="60" r="52" fill="#ffd1d1" stroke="#c1121f" stroke-width="6"/>
   <circle cx="42" cy="45" r="5" fill="#c1121f"/>
  <circle cx="78" cy="45" r="5" fill="#c1121f"/>
  <path d="M42 82 Q60 66 78 82" fill="none" stroke="#c1121f" stroke-width="5" stroke-linecap="round"/>
</svg>
`;

function showResult(isCorrect) {
  resultOverlay.classList.remove("hidden", "correct", "incorrect");

  if (isCorrect) {
    resultOverlay.classList.add("correct");
    resultText.textContent = "CORRECT!";
    resultIcon.innerHTML = correctSVG;
  } else {
    resultOverlay.classList.add("incorrect");
    resultText.textContent = "INCORRECT!";
    resultIcon.innerHTML = incorrectSVG;
  }

  setTimeout(() => {
    resultOverlay.classList.add("hidden");
    resultIcon.innerHTML = "";
  }, 800);
}

startGame();

</script>
